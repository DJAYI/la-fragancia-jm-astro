name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Stop service
        run: servy-cli stop --name="la-fragancia-astro"
        continue-on-error: true

      - name: Sync files
        shell: powershell
        run: |
          robocopy `
            "$env:GITHUB_WORKSPACE" `
            "C:\Users\YOLIMA\Workspace\la-fragancia-jm-astro" `
            /MIR `
            /XD node_modules .git .github

      - name: Install dependencies
        working-directory: C:\Users\YOLIMA\Workspace\la-fragancia-jm-astro
        run: npm ci

      - name: Build
        working-directory: C:\Users\YOLIMA\Workspace\la-fragancia-jm-astro
        run: npm run build

      - name: Start service
        run: servy-cli start --name="la-fragancia-astro"
